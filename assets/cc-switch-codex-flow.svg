<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">CC Switch 将 Codex 请求路由到 DeepSeek 的流程图</title>
  <desc id="desc">一张蓝白色教程插图，展示 ChatGPT/Codex、CC Switch 本地路由和 DeepSeek API 之间的关系。</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f7f9fe"/>
      <stop offset="1" stop-color="#eef4ff"/>
    </linearGradient>
    <linearGradient id="blue" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#425aef"/>
      <stop offset="1" stop-color="#5aa7ff"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#29418f" flood-opacity=".14"/>
    </filter>
  </defs>
  <rect width="1200" height="675" rx="28" fill="url(#bg)"/>
  <g opacity=".45" stroke="#d7e1ff" stroke-width="1">
    <path d="M0 112h1200M0 224h1200M0 336h1200M0 448h1200M0 560h1200"/>
    <path d="M160 0v675M320 0v675M480 0v675M640 0v675M800 0v675M960 0v675"/>
  </g>
  <g filter="url(#shadow)">
    <rect x="76" y="94" width="302" height="392" rx="22" fill="#fff" stroke="#dfe6f5"/>
    <rect x="449" y="94" width="302" height="392" rx="22" fill="#fff" stroke="#dfe6f5"/>
    <rect x="822" y="94" width="302" height="392" rx="22" fill="#fff" stroke="#dfe6f5"/>
  </g>
  <g font-family="Inter, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">
    <g transform="translate(116 132)">
      <rect width="72" height="72" rx="18" fill="#111827"/>
      <text x="36" y="45" text-anchor="middle" font-size="24" font-weight="900" fill="#fff">GPT</text>
      <text x="0" y="122" font-size="32" font-weight="900" fill="#1f2937">ChatGPT / Codex</text>
      <text x="0" y="163" font-size="20" font-weight="700" fill="#5b6475">官方登录态</text>
      <text x="0" y="196" font-size="20" font-weight="700" fill="#5b6475">手机远程操作</text>
      <text x="0" y="229" font-size="20" font-weight="700" fill="#5b6475">官方插件 / tool_search</text>
      <rect x="0" y="282" width="222" height="54" rx="14" fill="#eef2ff"/>
      <text x="111" y="317" text-anchor="middle" font-size="19" font-weight="900" fill="#425aef">保留官方能力</text>
    </g>
    <g transform="translate(489 132)">
      <rect width="72" height="72" rx="18" fill="url(#blue)"/>
      <text x="36" y="45" text-anchor="middle" font-size="24" font-weight="900" fill="#fff">CC</text>
      <text x="0" y="122" font-size="32" font-weight="900" fill="#1f2937">CC Switch v3.16.1</text>
      <text x="0" y="163" font-size="20" font-weight="700" fill="#5b6475">Codex 应用增强</text>
      <text x="0" y="196" font-size="20" font-weight="700" fill="#5b6475">Chat ↔ Responses 转换</text>
      <text x="0" y="229" font-size="20" font-weight="700" fill="#5b6475">本地路由接管</text>
      <rect x="0" y="282" width="222" height="54" rx="14" fill="#eafaf0"/>
      <text x="111" y="317" text-anchor="middle" font-size="19" font-weight="900" fill="#1c8b43">把模型流量转走</text>
    </g>
    <g transform="translate(862 132)">
      <rect width="72" height="72" rx="18" fill="#17a673"/>
      <text x="36" y="45" text-anchor="middle" font-size="24" font-weight="900" fill="#fff">DS</text>
      <text x="0" y="122" font-size="32" font-weight="900" fill="#1f2937">DeepSeek API</text>
      <text x="0" y="163" font-size="20" font-weight="700" fill="#5b6475">OpenAI 兼容接口</text>
      <text x="0" y="196" font-size="20" font-weight="700" fill="#5b6475">deepseek-chat</text>
      <text x="0" y="229" font-size="20" font-weight="700" fill="#5b6475">deepseek-reasoner</text>
      <rect x="0" y="282" width="222" height="54" rx="14" fill="#ecfdf5"/>
      <text x="111" y="317" text-anchor="middle" font-size="19" font-weight="900" fill="#14805a">降低调用成本</text>
    </g>
  </g>
  <g fill="none" stroke="#425aef" stroke-width="5" stroke-linecap="round" stroke-linejoin="round">
    <path d="M386 288h52"/>
    <path d="M424 272l16 16-16 16"/>
    <path d="M758 288h52"/>
    <path d="M796 272l16 16-16 16"/>
  </g>
  <g font-family="Inter, system-ui, sans-serif" font-size="22" font-weight="900" fill="#1f2937">
    <text x="600" y="568" text-anchor="middle">官方登录继续留在 ChatGPT / Codex，模型请求经 CC Switch 转到 DeepSeek</text>
  </g>
</svg>
